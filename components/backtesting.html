<section id="backtesting-section" class="content-section" style="display: none;">
    <div class="header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>Backtesting Sessions</h2>
        <button class="btn btn-primary" id="btn-new-backtest">
            <i class="fa-solid fa-plus"></i> New Backtest
        </button>
    </div>

    <!-- Active Backtest View (Hidden if no session selected) -->
    <div id="active-backtest-view" style="display: none;">
        <div class="dashboard-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 24px;">
            <div class="card stat-card gradient-border" style="grid-column: span 1;">
                <div class="card-header">
                    <h3>Starting Balance</h3>
                    <i class="fa-solid fa-wallet card-icon"></i>
                </div>
                <div class="card-body">
                    <h2 id="bt-initial-balance">$0.00</h2>
                </div>
            </div>
            <div class="card stat-card income" style="grid-column: span 1;">
                <div class="card-header">
                    <h3>Current Balance</h3>
                    <i class="fa-solid fa-money-bill-trend-up card-icon success-text"></i>
                </div>
                <div class="card-body">
                    <h2 id="bt-current-balance" class="success-text">$0.00</h2>
                    <div class="trend positive" style="margin-top: 8px;">
                        <span id="bt-net-pnl">+$0.00</span>
                    </div>
                </div>
            </div>
            <div class="card stat-card trading-stats" style="grid-column: span 1;">
                <div class="card-header">
                    <h3>Performance</h3>
                    <i class="fa-solid fa-chart-pie card-icon primary-text"></i>
                </div>
                <div class="card-body">
                    <h2 id="bt-win-rate">0%</h2>
                    <p class="sub-text">Total Trades: <span id="bt-total-trades">0</span></p>
                </div>
            </div>
        </div>
        
        <div class="header-actions" style="margin-bottom: 16px;">
            <h3 id="bt-session-title">Session Trades</h3>
            <button class="btn btn-outline" id="btn-close-backtest" style="margin-right: -100px;">
                <i class="fa-solid fa-arrow-left"></i> Back to Sessions
            </button>
            <button class="btn btn-primary" id="btn-add-backtest-trade">
                <i class="fa-solid fa-plus"></i> Log Trade
            </button>
        </div>
        
        <div class="card table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Asset</th>
                        <th>Direction</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>P&L</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="backtest-trades-list">
                    <!-- Internal session trades run here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Backtest Session List View -->
    <div id="backtest-list-view">
        <div class="card table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Session Name</th>
                        <th>Initial Balance</th>
                        <th>Current Balance</th>
                        <th>Started On</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="backtest-sessions-list">
                    <!-- Session rows populate here -->
                </tbody>
            </table>
        </div>
    </div>
</section>

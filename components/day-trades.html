<section id="day-trades-section" class="content-section" style="display: none;">
    <div class="section-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="action-btn" id="btn-back-to-journal"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="day-trades-title">Trades for ...</h2>
        </div>
        <button class="btn btn-primary" id="btn-add-trade-day">
            <i class="fa-solid fa-plus"></i> Log Trade
        </button>
    </div>

    <div class="row" style="margin-bottom: 24px;">
        <div class="col-md-4">
            <div class="card stat-card" style="margin-bottom: 0;">
                <h3 style="font-size: 0.9rem; margin-bottom: 5px; color: var(--text-muted);">Daily Net P&L</h3>
                <h2 id="day-trades-pnl" class="success-text" style="margin: 0;">$0.00</h2>
            </div>
        </div>
    </div>

    <div class="card table-card">
        <div class="table-responsive">
            <table class="data-table" id="day-trades-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Asset</th>
                        <th>Direction</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>PnL</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="day-trades-list">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>
    </div>
</section>

<section id="journal-section" class="content-section">
    <!-- P&L Calendar -->
    <div class="card pnl-calendar-card" style="margin-bottom: 24px;">
        <div class="calendar-header" style="justify-content: flex-end;">
            <div class="calendar-controls">
                <button class="action-btn" id="cal-prev-month"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="cal-month-display" id="cal-month-display">Mar 2026</div>
                <button class="action-btn" id="cal-next-month"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="calendar-grid" id="pnl-calendar-grid">
            <div class="cal-header-cell">Mon</div>
            <div class="cal-header-cell">Tue</div>
            <div class="cal-header-cell">Wed</div>
            <div class="cal-header-cell">Thu</div>
            <div class="cal-header-cell">Fri</div>
            <!-- Javascript will inject the 5-column day grid here -->
        </div>
    </div>
</section>

<div id="modals-wrapper">
    <!-- Add Transaction Modal -->
    <div class="modal-overlay" id="transaction-modal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>Add Transaction</h2>
                <button class="btn-close" id="close-transaction-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="transaction-form">
                    <div class="form-group">
                        <label>Type</label>
                        <input type="hidden" id="tx-type" value="income">
                        <div class="toggle-group">
                            <button type="button" class="toggle-btn active income-toggle" data-value="income">
                                <i class="fa-solid fa-arrow-trend-up"></i> Income
                            </button>
                            <button type="button" class="toggle-btn expense-toggle" data-value="expense">
                                <i class="fa-solid fa-arrow-trend-down"></i> Expense
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="tx-amount">Amount</label>
                        <input type="number" id="tx-amount" step="0.01" min="0" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="tx-desc">Description</label>
                        <input type="text" id="tx-desc" required placeholder="Salary, Groceries, etc.">
                    </div>
                    <div class="form-group">
                        <label for="tx-date">Date</label>
                        <input type="date" id="tx-date" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Save Transaction</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Add Trade Modal -->
    <div class="modal-overlay" id="trade-modal" style="z-index: 1050;">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>Log Trade</h2>
                <button class="btn-close" id="close-trade-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                <form id="trade-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="td-asset">Asset</label>
                            <input type="text" id="td-asset" value="XAUUSD" readonly
                                style="background: var(--bg-color); cursor: not-allowed; color: var(--text-color);">
                        </div>
                        <div class="form-group">
                            <label for="td-lots">Lot Size</label>
                            <input type="number" id="td-lots" step="0.01" min="0.01" required placeholder="1.00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Direction</label>
                            <input type="hidden" id="td-direction" value="long">
                            <div class="toggle-group">
                                <button type="button" class="toggle-btn active long-toggle" data-value="long">
                                    <i class="fa-solid fa-arrow-up"></i> Long
                                </button>
                                <button type="button" class="toggle-btn short-toggle" data-value="short">
                                    <i class="fa-solid fa-arrow-down"></i> Short
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="td-date">Date</label>
                            <input type="date" id="td-date" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="td-entry">Entry Price</label>
                            <input type="number" id="td-entry" step="0.001" min="0" required placeholder="0.000">
                        </div>
                        <div class="form-group">
                            <label for="td-exit">Exit Price</label>
                            <input type="number" id="td-exit" step="0.001" min="0" required placeholder="0.000">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="td-sl">Stop Loss</label>
                            <input type="number" id="td-sl" step="0.001" min="0" placeholder="0.000 (Optional)">
                        </div>
                        <div class="form-group">
                            <label for="td-tp">Take Profit</label>
                            <input type="number" id="td-tp" step="0.001" min="0" placeholder="0.000 (Optional)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="td-pnl-preview">Auto-Calculated P&L ($)</label>
                        <input type="text" id="td-pnl-preview" readonly placeholder="$0.00"
                            style="background: var(--bg-color); cursor: not-allowed; font-weight: bold;">
                    </div>
                    <div class="form-group">
                        <label for="td-notes">Notes / Confluence</label>
                        <textarea id="td-notes" rows="3" placeholder="Why did you take this trade?"
                            style="resize: none;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Log Trade</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Day Trades Modal -->
    <div class="modal-overlay" id="day-trades-modal" style="z-index: 999;">
        <div class="modal glass-panel" style="max-width: 1000px; width: 95%;">
            <div class="modal-header">
                <h2 id="day-trades-title">Trades for ...</h2>
                <button class="btn-close" id="close-day-trades-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 15px; flex-wrap: wrap;">
                    <div class="card stat-card"
                        style="margin-bottom: 0; padding: 15px 20px; flex: 1; min-width: 200px;">
                        <h3 style="font-size: 0.85rem; margin-bottom: 5px; color: var(--text-muted);">Daily Net P&L</h3>
                        <h2 id="day-trades-pnl" class="success-text" style="margin: 0;">$0.00</h2>
                    </div>
                    <div class="card stat-card"
                        style="margin-bottom: 0; padding: 15px 20px; flex: 1; min-width: 150px;">
                        <h3 style="font-size: 0.85rem; margin-bottom: 5px; color: var(--text-muted);">Total Trades</h3>
                        <h2 id="day-trades-count" style="margin: 0; color: var(--text-main);">0</h2>
                    </div>
                    <button class="btn btn-primary" id="btn-add-trade-day" style="height: fit-content;">
                        <i class="fa-solid fa-plus"></i> Log Trade
                    </button>
                </div>
                <div class="table-responsive"
                    style="max-height: 400px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px;">
                    <table class="data-table" id="day-trades-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Asset</th>
                                <th>Direction</th>
                                <th>Entry</th>
                                <th>Exit</th>
                                <th>PnL</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="day-trades-list">
                            <!-- Dynamic content -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- New Backtest Session Modal -->
    <div class="modal-overlay" id="new-backtest-modal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>New Backtesting Session</h2>
                <button class="btn-close" id="close-new-backtest-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="new-backtest-form">
                    <div class="form-group">
                        <label for="bt-session-name">Strategy / Session Name</label>
                        <input type="text" id="bt-session-name" required placeholder="e.g. Trend Continuation 2026">
                    </div>
                    <div class="form-group">
                        <label for="bt-session-balance">Initial Balance ($)</label>
                        <input type="number" step="0.01" id="bt-session-balance" required placeholder="10000.00">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 20px;">
                        <i class="fa-solid fa-play"></i> Start Backtest
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Log Backtest Trade Modal -->
    <div class="modal-overlay" id="backtest-trade-modal" style="z-index: 1050;">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>Log Backtest Trade</h2>
                <button class="btn-close" id="close-backtest-trade-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                <form id="backtest-trade-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bt-td-asset">Asset</label>
                            <input type="text" id="bt-td-asset" value="XAUUSD" readonly
                                style="background: var(--bg-color); cursor: not-allowed; color: var(--text-color);">
                        </div>
                        <div class="form-group">
                            <label for="bt-td-lots">Lot Size</label>
                            <input type="number" id="bt-td-lots" step="0.01" min="0.01" required placeholder="1.00">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Direction</label>
                            <input type="hidden" id="bt-td-direction" value="long">
                            <div class="toggle-group">
                                <button type="button" class="toggle-btn active long-toggle" data-value="long">
                                    <i class="fa-solid fa-arrow-up"></i> Long
                                </button>
                                <button type="button" class="toggle-btn short-toggle" data-value="short">
                                    <i class="fa-solid fa-arrow-down"></i> Short
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="bt-td-date">Date</label>
                            <input type="date" id="bt-td-date" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bt-td-entry">Entry Price</label>
                            <input type="number" id="bt-td-entry" step="0.001" min="0" required placeholder="0.000">
                        </div>
                        <div class="form-group">
                            <label for="bt-td-exit">Exit Price</label>
                            <input type="number" id="bt-td-exit" step="0.001" min="0" required placeholder="0.000">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bt-td-sl">Stop Loss</label>
                            <input type="number" id="bt-td-sl" step="0.001" min="0" placeholder="0.000 (Optional)">
                        </div>
                        <div class="form-group">
                            <label for="bt-td-tp">Take Profit</label>
                            <input type="number" id="bt-td-tp" step="0.001" min="0" placeholder="0.000 (Optional)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="bt-td-pnl-preview">Auto-Calculated P&L ($)</label>
                        <input type="text" id="bt-td-pnl-preview" readonly placeholder="$0.00"
                            style="background: var(--bg-color); cursor: not-allowed; font-weight: bold;">
                    </div>
                    <div class="form-group">
                        <label for="bt-td-notes">Notes / Confluence (Optional)</label>
                        <textarea id="bt-td-notes" rows="3" placeholder="Why did you take this trade?"
                            style="resize: none;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Log Trade</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Note Modal -->
    <div class="modal-overlay" id="note-modal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2 id="note-modal-title">Take a note</h2>
                <button class="btn-close" id="close-note-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="note-form">
                    <input type="hidden" id="note-id" value="">
                    <input type="hidden" id="note-color" value="#1e222d">

                    <div class="form-group">
                        <input type="text" id="note-title" required placeholder="Title"
                            style="font-weight: 600; font-size: 1.1rem; border: none; background: transparent; padding: 0; margin-bottom: 15px; box-shadow: none;">
                    </div>
                    <div class="form-group">
                        <textarea id="note-content" rows="6" placeholder="Take a note..."
                            style="border: none; background: transparent; padding: 0; box-shadow: none; resize: none;"></textarea>
                    </div>

                    <div class="form-group">
                        <div class="color-picker-row">
                            <div class="color-swatch active" data-color="#1e222d" style="background-color: #1e222d;">
                            </div>
                            <div class="color-swatch" data-color="#552c2c" style="background-color: #552c2c;"></div>
                            <div class="color-swatch" data-color="#49442a" style="background-color: #49442a;"></div>
                            <div class="color-swatch" data-color="#2c4233" style="background-color: #2c4233;"></div>
                            <div class="color-swatch" data-color="#2d3f4f" style="background-color: #2d3f4f;"></div>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Portfolio Asset Modal -->
    <div class="modal-overlay" id="portfolio-modal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2 id="portfolio-modal-title">Add Asset</h2>
                <button class="btn-close" id="close-portfolio-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="portfolio-form">
                    <input type="hidden" id="portfolio-id" value="">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="pf-ticker">Ticker Symbol</label>
                            <input type="text" id="pf-ticker" required placeholder="e.g. AAPL, NVDA"
                                style="text-transform: uppercase;">
                        </div>
                        <div class="form-group">
                            <label for="pf-shares">Number of Shares</label>
                            <input type="number" id="pf-shares" step="0.00001" min="0" required placeholder="10">
                        </div>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                        <button type="submit" class="btn btn-primary btn-block">Save Portfolio</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

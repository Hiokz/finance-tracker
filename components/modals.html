<div id="modals-wrapper">
    <!-- Add Transaction Modal -->
    <div class="modal-overlay" id="transaction-modal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>Add Transaction</h2>
                <button class="btn-close" id="close-transaction-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="tx-type">Type</label>
                        <select id="tx-type" required>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tx-amount">Amount</label>
                        <input type="number" id="tx-amount" step="0.01" min="0" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="tx-desc">Description</label>
                        <input type="text" id="tx-desc" required placeholder="Salary, Groceries, etc.">
                    </div>
                    <div class="form-group">
                        <label for="tx-category">Category</label>
                        <input type="text" id="tx-category" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label for="tx-date">Date</label>
                        <input type="date" id="tx-date" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Save Transaction</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Add Trade Modal -->
    <div class="modal-overlay" id="trade-modal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>Log Trade</h2>
                <button class="btn-close" id="close-trade-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="trade-form">
                    <div class="form-group">
                        <label for="td-asset">Asset (e.g., BTC/USD, AAPL)</label>
                        <input type="text" id="td-asset" required placeholder="Asset Pair">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="td-direction">Direction</label>
                            <select id="td-direction" required>
                                <option value="long">Long</option>
                                <option value="short">Short</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="td-date">Date</label>
                            <input type="date" id="td-date" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="td-entry">Entry Price</label>
                            <input type="number" id="td-entry" step="0.00001" min="0" required placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label for="td-exit">Exit Price</label>
                            <input type="number" id="td-exit" step="0.00001" min="0" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="td-notes">Notes / Confluence</label>
                        <textarea id="td-notes" rows="3" placeholder="Why did you take this trade?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Log Trade</button>
                </form>
            </div>
        </div>
    </div>
</div>

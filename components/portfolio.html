<section id="portfolio-section" class="content-section">
    <div class="header-actions"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>Stock Portfolio</h2>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" id="btn-portfolio-history">
                <i class="fa-solid fa-clock-rotate-left"></i> History
            </button>
            <button class="btn btn-primary" id="btn-add-portfolio">
                <i class="fa-solid fa-plus"></i> Add Asset
            </button>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="dashboard-grid" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 24px;">
        <div class="card stat-card gradient-border" style="grid-column: span 1;">
            <div class="card-header">
                <h3>Total Market Value</h3>
                <i class="fa-solid fa-wallet card-icon"></i>
            </div>
            <div class="card-body">
                <h2 id="portfolio-total-value">$0.00</h2>
                <small id="portfolio-total-value-sgd" class="text-muted" style="display:block; margin-top: 4px;">S$0.00
                    SGD</small>
            </div>
        </div>
        <div class="card stat-card income" style="grid-column: span 1;">
            <div class="card-header">
                <h3>Active Positions</h3>
                <i class="fa-solid fa-briefcase card-icon text-muted"></i>
            </div>
            <div class="card-body">
                <h2 id="portfolio-active-positions" class="text-main">0</h2>
            </div>
        </div>
        <div class="card stat-card trading-stats" style="grid-column: span 1;">
            <div class="card-header">
                <h3>Total Assets</h3>
                <i class="fa-solid fa-layer-group card-icon"></i>
            </div>
            <div class="card-body">
                <h2 id="portfolio-top-asset" class="primary-text">0</h2>
            </div>
        </div>
    </div>

    <div class="card table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Shares</th>
                    <th>Live Price</th>
                    <th>Market Value</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="portfolio-table-body">
                <!-- Data populated by JS -->
            </tbody>
        </table>
    </div>
</section>

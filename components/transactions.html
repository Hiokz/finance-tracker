<section id="transactions-section" class="content-section">
    <div class="section-header">
        <h2>Transactions</h2>
        <button class="btn btn-primary" id="btn-add-transaction">
            <i class="fa-solid fa-plus"></i> New Transaction
        </button>
    </div>
    
    <div class="card table-card">
        <div class="table-responsive">
            <table class="data-table" id="transactions-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="transactions-list">
                    <!-- Dynamic content -->
                </tbody>
            </table>
            <div id="no-transactions" class="empty-state">
                <i class="fa-solid fa-receipt"></i>
                <p>No transactions yet</p>
            </div>
        </div>
    </div>
</section>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance & Trading Journal</title>
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://cvzqsgpczhjlgjmundga.supabase.co;">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="login-placeholder"></div>

    <div class="app-container" id="app-wrapper" style="display: none;">
        <div id="sidebar-placeholder"></div>

        <main class="main-content">
            <header class="top-header">
                <div class="header-title">
                    <h1 id="page-title">Dashboard</h1>
                    <p class="date-display" id="current-date">--</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-icon" title="Notifications">
                        <i class="fa-regular fa-bell"></i>
                    </button>
                    <button class="btn btn-icon" title="Settings">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
            </header>

            <div class="sections-container">
                <div id="dashboard-placeholder"></div>
                <div id="portfolio-placeholder"></div>
                <div id="transactions-placeholder"></div>

                <div id="notes-placeholder"></div>
            </div>
        </main>
    </div>

    <div id="modals-placeholder"></div>

    <script src="script.js"></script>
</body>

</html>
